[base]
platform  = espressif32
board     = heltec_wifi_lora_32_V3
framework = arduino
monitor_speed = 115200
lib_deps =
    jgromes/RadioLib @ 6.6.0                  ; LoRa radio driver — pinned to v6 (stable LoRaWAN API)
    https://github.com/kosme/arduinoFFT      ; FFT computation (Phase 3)
    https://github.com/knolleary/pubsubclient ; MQTT client (Phase 6)
    olikraus/U8g2                             ; OLED display driver (works reliably on Heltec V3)
    adafruit/Adafruit INA219 @ ^1.2.3               ; Power sensor (matches professor's example)

; Default environment — spikes mode, same as current behavior
[env:heltec_wifi_lora_32_V3]
extends = base
build_flags = -D SIGNAL_MODE=2

; Phase 10 comparison environments
[env:clean]
extends = base
build_flags = -D SIGNAL_MODE=0

[env:clean_b]
extends = base
build_flags = -D SIGNAL_MODE=0 -D CLEAN_SIGNAL_VARIANT=1

[env:clean_c]
extends = base
build_flags = -D SIGNAL_MODE=0 -D CLEAN_SIGNAL_VARIANT=2

[env:noise]
extends = base
build_flags = -D SIGNAL_MODE=1

[env:spikes]
extends = base
build_flags = -D SIGNAL_MODE=2

; Bonus: anomaly detection at different injection rates (flash each, record TPR/FPR)
[env:spikes_p1]
extends = base
build_flags = -D SIGNAL_MODE=2 -D SPIKE_PROB_PCT=1

[env:spikes_p5]
extends = base
build_flags = -D SIGNAL_MODE=2 -D SPIKE_PROB_PCT=5

[env:spikes_p10]
extends = base
build_flags = -D SIGNAL_MODE=2 -D SPIKE_PROB_PCT=10

; Plot-capture environments — emit one structured raw FFT window snapshot
; per completed FFT cycle so host scripts can build DUT-based waveform/spectrum
; figures without changing the normal runtime logs.
[env:clean_plot_capture]
extends = base
build_flags = -D SIGNAL_MODE=0 -D PLOT_CAPTURE=1

[env:clean_b_plot_capture]
extends = base
build_flags = -D SIGNAL_MODE=0 -D CLEAN_SIGNAL_VARIANT=1 -D PLOT_CAPTURE=1

[env:clean_c_plot_capture]
extends = base
build_flags = -D SIGNAL_MODE=0 -D CLEAN_SIGNAL_VARIANT=2 -D PLOT_CAPTURE=1

[env:noise_plot_capture]
extends = base
build_flags = -D SIGNAL_MODE=1 -D PLOT_CAPTURE=1

[env:spikes_plot_capture]
extends = base
build_flags = -D SIGNAL_MODE=2 -D PLOT_CAPTURE=1
